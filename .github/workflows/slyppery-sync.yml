# .github/workflows/sync.yml
name: Sync Slippery Hands Static Build

on:
  repository_dispatch:
    types: [fetch-slippery-hands-static]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true


      - name: Run sync script
        run: bash "${{ github.workspace }}/scripts/fetch-slippery-hands.sh"
